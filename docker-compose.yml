name: wordle-2026
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wordle_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wordle_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./Backend
    ports:
      - "5000:5000"
      - "9229:9229" # The standard Node.js debug port
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/wordle_db
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./Backend:/app
      - /app/node_modules # Prevents host node_modules from overwriting container's

  frontend:
    build: ./Frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./Frontend:/app
      - /app/node_modules

volumes:
  pgdata: